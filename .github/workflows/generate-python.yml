name: Generate Python files from JSON Schema

on:
  push:
    branches:
      - develop
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout brapi-py (develop branch)
        uses: actions/checkout@v4
        with:
          ref: develop
          fetch-depth: 0
          ssh-key: ${{ secrets.DEPLOY_KEY }}
          path: repo

      - name: Checkout BrAPI schema
        uses: actions/checkout@v4
        with:
          repository: plantbreeding/BrAPI
          path: BrAPI

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Change wrapper permissions
        working-directory: ./repo/generator
        run: chmod +x ./gradlew

      - name: Generate Python code
        working-directory: ./repo/generator
        run: ./gradlew generatePython

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Verify generated code imports cleanly
        working-directory: ./repo
        run: |
          pip install -e ".[dev]"
          python -c "import brapi; print('brapi-py version:', brapi.__version__)"

      - name: Commit generated files to master
        working-directory: ./repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Fetch and switch to master
          git fetch origin master
          git checkout master
          # Merge develop (non-generated source) into master
          git merge develop --no-edit -m "GitHub Action - Merge develop into master"
          # Force-add the generated files (they are .gitignore'd on develop but not on master)
          git add -f src/brapi/_compat.py
          git add -f src/brapi/generated_*.py
          git add -f src/brapi/entities/generated_*.py
          git add -f src/brapi/entities/__init__.py
          git add -f notebooks/
          # Commit only if there are staged changes
          git diff --cached --quiet || git commit -m "GitHub Action - Generate Python files from JSON Schema"
          git push origin master
