# germplasm-context.yaml
# -------------------------------------------------------------------
# Example Thymeleaf context for generating entities/germplasm.py
# from templates/python/EntityClass.txt.
#
# Variable names match exactly what the template references via [[${...}]].
# Feed these into a org.thymeleaf.context.Context (or equivalent) before
# calling templateEngine.process("EntityClass.txt", context).
# -------------------------------------------------------------------

# ── Top-level scalars ────────────────────────────────────────────────────────

entityName:       Germplasm
entityNameLower:  germplasm
moduleName:       Germplasm           # used only in the module docstring header

# ── Sub-models ───────────────────────────────────────────────────────────────
# Each entry becomes a standalone Pydantic BaseModel class.
# All properties are generated as Optional[pyType] = None.

subModels:

  - name:     Donor
    docstring: "Identifier assigned to an accession by the material donor."
    properties:
      - { name: donorAccessionNumber, pyType: str }
      - { name: donorInstituteCode,   pyType: str }

  - name:     GermplasmOrigin
    docstring: "Geographic origin information for germplasm material."
    properties:
      - { name: coordinateUncertainty, pyType: str }
      - { name: coordinates,           pyType: "List[Any]" }

  - name:     StorageType
    docstring: "Storage type at a genebank."
    properties:
      - { name: code,        pyType: str }
      - { name: description, pyType: str }

  - name:     Synonym
    docstring: "Alternative name or ID for a germplasm."
    properties:
      - { name: synonym, pyType: str }
      - { name: type,    pyType: str }

  - name:     TaxonId
    docstring: "Taxonomic identifier from an external source."
    properties:
      - { name: sourceName, pyType: str }
      - { name: taxonId,    pyType: str }

  - name:     ExternalReference
    docstring: "External reference to this germplasm in another system."
    properties:
      - { name: referenceDbId,    pyType: str }
      - { name: referenceName,    pyType: str }
      - { name: referenceSource,  pyType: str }

# ── Primary model ─────────────────────────────────────────────────────────────

primaryModel:

  docstring: "BrAPI Germplasm entity."

  # Non-optional fields (no default, must be present in API response)
  requiredFields:
    - { name: germplasmDbId,   pyType: str }
    - { name: germplasmName,   pyType: str }
    - { name: germplasmPUI,    pyType: str }
    - { name: commonCropName,  pyType: str }

  # Optional scalar (primitive) fields — generated as Optional[pyType] = None
  scalarFields:
    - { name: accessionNumber,                           pyType: str }
    - { name: acquisitionDate,                           pyType: str }
    - { name: biologicalStatusOfAccessionCode,           pyType: str }
    - { name: biologicalStatusOfAccessionDescription,    pyType: str }
    - { name: collection,                                pyType: str }
    - { name: countryOfOriginCode,                       pyType: str }
    - { name: defaultDisplayName,                        pyType: str }
    - { name: documentationURL,                          pyType: str }
    - { name: generationCode,                            pyType: str }
    - { name: genus,                                     pyType: str }
    - { name: germplasmPreprocessing,                    pyType: str }
    - { name: instituteCode,                             pyType: str }
    - { name: instituteName,                             pyType: str }
    - { name: pedigree,                                  pyType: str }
    - { name: seedSource,                                pyType: str }
    - { name: seedSourceDescription,                     pyType: str }
    - { name: species,                                   pyType: str }
    - { name: speciesAuthority,                          pyType: str }
    - { name: subtaxa,                                   pyType: str }
    - { name: subtaxaAuthority,                          pyType: str }

  # Optional nested lists — generated as Optional[List[itemType]] = None
  nestedFields:
    - { name: donors,               itemType: Donor              }
    - { name: externalReferences,   itemType: ExternalReference  }
    - { name: germplasmOrigin,      itemType: GermplasmOrigin    }
    - { name: storageTypes,         itemType: StorageType        }
    - { name: synonyms,             itemType: Synonym            }
    - { name: taxonIds,             itemType: TaxonId            }

  # Relationship fields — typed Optional[Any] = None (arrive as plain dicts)
  relationshipFields:
    - breedingMethod
    - cultivar
    - crop
    - additionalInfo

# ── Endpoints ─────────────────────────────────────────────────────────────────

endpoints:
  search: search/germplasm
  table:  search/germplasm/table   # set to null to suppress table endpoint

# ── DataFrame flattener config ────────────────────────────────────────────────

flattenConfig:

  # These relationship fields are popped from the row dict, then any key
  # ending in DbId/Name/PUI is hoisted as "{rel}_{key}".
  relationshipFields:
    - breedingMethod
    - cultivar
    - crop

  # These nested-list fields are popped and json.dumps'd to a single string
  # so each entity stays on one DataFrame row.
  arrayFields:
    - donors
    - externalReferences
    - germplasmOrigin
    - storageTypes
    - synonyms
    - taxonIds

# ── Filter methods ────────────────────────────────────────────────────────────
# Each entry generates one def in the query builder.
#   methodName   → Python method name
#   paramName    → BrAPI JSON request body key
#   argName      → Python snake_case parameter name
#   pyType       → Python type annotation for the argument
#   docstring    → One-line method docstring
#   groupComment → If non-null, a "# --- comment ---" separator is emitted
#                  before this method (first entry of a group).
#   exampleArg   → Literal used in the class-level docstring example (first 2 methods only)

filterMethods:

  # From CropParameters
  - methodName:    by_crop
    paramName:     commonCropNames
    argName:       common_crop_names
    pyType:        "List[str]"
    docstring:     'Filter by common crop names (e.g. ``["Wheat", "Barley"]``).'
    groupComment:  "From CropParameters"
    exampleArg:    '["Wheat"]'

  # From GermplasmParameters
  - methodName:    by_germplasm_name
    paramName:     germplasmNames
    argName:       names
    pyType:        "List[str]"
    docstring:     "Filter by exact germplasm names."
    groupComment:  "From GermplasmParameters"
    exampleArg:    '["Norin 61"]'

  - methodName:    by_germplasm_db_id
    paramName:     germplasmDbIds
    argName:       db_ids
    pyType:        "List[str]"
    docstring:     "Filter by germplasm database IDs."
    groupComment:  null
    exampleArg:    null

  - methodName:    germplasm_puis
    paramName:     germplasmPUIs
    argName:       puis
    pyType:        "List[str]"
    docstring:     "Filter by Permanent Unique Identifiers."
    groupComment:  null
    exampleArg:    null

  - methodName:    accession_numbers
    paramName:     accessionNumbers
    argName:       numbers
    pyType:        "List[str]"
    docstring:     "Filter by genebank accession numbers."
    groupComment:  null
    exampleArg:    null

  - methodName:    collections
    paramName:     collections
    argName:       collection_names
    pyType:        "List[str]"
    docstring:     "Filter by panel/collection names."
    groupComment:  null
    exampleArg:    null

  - methodName:    family_codes
    paramName:     familyCodes
    argName:       codes
    pyType:        "List[str]"
    docstring:     "Filter by family codes."
    groupComment:  null
    exampleArg:    null

  - methodName:    institute_codes
    paramName:     instituteCodes
    argName:       codes
    pyType:        "List[str]"
    docstring:     'Filter by FAO/WIEWS institute codes (e.g. ``["DEU084"]``).'
    groupComment:  null
    exampleArg:    null

  - methodName:    binomial_names
    paramName:     binomialNames
    argName:       names
    pyType:        "List[str]"
    docstring:     "Filter by binomial (genus + species) names."
    groupComment:  null
    exampleArg:    null

  - methodName:    genus
    paramName:     genus
    argName:       genera
    pyType:        "List[str]"
    docstring:     'Filter by genus (e.g. ``["Triticum", "Hordeum"]``).'
    groupComment:  null
    exampleArg:    null

  - methodName:    species
    paramName:     species
    argName:       species_list
    pyType:        "List[str]"
    docstring:     'Filter by species epithet (e.g. ``["aestivum", "vulgare"]``).'
    groupComment:  null
    exampleArg:    null

  - methodName:    synonyms
    paramName:     synonyms
    argName:       synonym_list
    pyType:        "List[str]"
    docstring:     "Filter by synonym names or IDs."
    groupComment:  null
    exampleArg:    null

  # From ProgramParameters
  - methodName:    by_program
    paramName:     programDbIds
    argName:       program_db_ids
    pyType:        "List[str]"
    docstring:     "Filter by breeding program database IDs."
    groupComment:  "From ProgramParameters"
    exampleArg:    null

  - methodName:    by_program_name
    paramName:     programNames
    argName:       program_names
    pyType:        "List[str]"
    docstring:     "Filter by breeding program names."
    groupComment:  null
    exampleArg:    null

  # From StudyParameters
  - methodName:    by_study
    paramName:     studyDbIds
    argName:       study_db_ids
    pyType:        "List[str]"
    docstring:     "Filter by study database IDs."
    groupComment:  "From StudyParameters"
    exampleArg:    null

  - methodName:    by_study_name
    paramName:     studyNames
    argName:       study_names
    pyType:        "List[str]"
    docstring:     "Filter by study names."
    groupComment:  null
    exampleArg:    null

  # From TrialParameters
  - methodName:    by_trial
    paramName:     trialDbIds
    argName:       trial_db_ids
    pyType:        "List[str]"
    docstring:     "Filter by trial database IDs."
    groupComment:  "From TrialParameters"
    exampleArg:    null

  - methodName:    by_trial_name
    paramName:     trialNames
    argName:       trial_names
    pyType:        "List[str]"
    docstring:     "Filter by trial names."
    groupComment:  null
    exampleArg:    null

  # Pedigree
  - methodName:    parent_ids
    paramName:     parentDbIds
    argName:       parent_db_ids
    pyType:        "List[str]"
    docstring:     "Filter by parent germplasm database IDs."
    groupComment:  "Pedigree"
    exampleArg:    null

  - methodName:    progeny_ids
    paramName:     progenyDbIds
    argName:       progeny_db_ids
    pyType:        "List[str]"
    docstring:     "Filter by progeny germplasm database IDs."
    groupComment:  null
    exampleArg:    null

  # From FilterAndSortParameters
  - methodName:    external_reference_ids
    paramName:     externalReferenceIds
    argName:       ids
    pyType:        "List[str]"
    docstring:     "Filter by external reference IDs."
    groupComment:  "From FilterAndSortParameters"
    exampleArg:    null

  - methodName:    external_reference_sources
    paramName:     externalReferenceSources
    argName:       sources
    pyType:        "List[str]"
    docstring:     "Filter by external reference source names."
    groupComment:  null
    exampleArg:    null

  # From IncludedAttributesParameters (bool, not list — kept separate from bulk filter)
  - methodName:    include_attributes
    paramName:     includeAttributeValues
    argName:       include
    pyType:        bool
    docstring:     "Request inclusion of ``attributeValues`` in the response."
    groupComment:  "From IncludedAttributesParameters"
    exampleArg:    null

# ── Bulk filter convenience method ────────────────────────────────────────────
# Each entry generates one optional keyword argument in filter() and the
# corresponding if/call block in the method body.
# exampleValue is used literally in the generated docstring example (first 3 shown).

bulkFilterParams:
  - { argName: common_crop_names, pyType: "List[str]",  methodName: by_crop,              exampleValue: '["Wheat"]'      }
  - { argName: germplasm_names,   pyType: "List[str]",  methodName: by_germplasm_name,    exampleValue: '["Norin 61"]'   }
  - { argName: germplasm_db_ids,  pyType: "List[str]",  methodName: by_germplasm_db_id,   exampleValue: '["1234"]'       }
  - { argName: germplasm_puis,    pyType: "List[str]",  methodName: germplasm_puis,        exampleValue: null             }
  - { argName: accession_numbers, pyType: "List[str]",  methodName: accession_numbers,    exampleValue: null             }
  - { argName: institute_codes,   pyType: "List[str]",  methodName: institute_codes,      exampleValue: null             }
  - { argName: genus,             pyType: "List[str]",  methodName: genus,                exampleValue: null             }
  - { argName: species,           pyType: "List[str]",  methodName: species,              exampleValue: null             }
  - { argName: collections,       pyType: "List[str]",  methodName: collections,          exampleValue: null             }
  - { argName: synonyms,          pyType: "List[str]",  methodName: synonyms,             exampleValue: null             }
  - { argName: parent_db_ids,     pyType: "List[str]",  methodName: parent_ids,           exampleValue: null             }
  - { argName: progeny_db_ids,    pyType: "List[str]",  methodName: progeny_ids,          exampleValue: null             }
