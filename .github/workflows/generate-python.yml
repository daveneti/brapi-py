name: Generate Python files from JSON Schema

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      skip_job: ${{ steps.skip.outputs.skip_job }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Check last commit message
        id: commit-message
        run: |
          echo "COMMIT_MESSAGE=$(git log -1 --pretty=format:'%s')" >> "$GITHUB_ENV"
      - id: skip
        name: Skip if automated push
        if: startsWith(env.COMMIT_MESSAGE, 'GitHub Action')
        run: |
          echo "Automated commit detected - skipping job"
          echo "skip_job=true" >> "$GITHUB_OUTPUT"

  build:
    runs-on: ubuntu-latest
    needs: check
    if: needs.check.outputs.skip_job != 'true'
    steps:
      - name: Checkout brapi-py
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ssh-key: ${{ secrets.DEPLOY_KEY }}
          path: main

      - name: Checkout BrAPI schema
        uses: actions/checkout@v4
        with:
          repository: plantbreeding/BrAPI
          path: BrAPI

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Change wrapper permissions
        working-directory: ./main/generator
        run: chmod +x ./gradlew

      - name: Generate Python code
        working-directory: ./main/generator
        run: ./gradlew generatePython

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Verify generated code imports cleanly
        working-directory: ./main
        run: |
          pip install -e ".[dev]"
          python -c "import brapi; print('brapi-py version:', brapi.__version__)"

      - name: Commit and push generated files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          repository: main
          commit_message: GitHub Action - Generate Python files from JSON Schema
          file_pattern: 'src/**/* notebooks/**/*'
